<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Canchas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <!-- <script src="../../assets/js/authGuard.js" defer></script> -->
    <script src="../../assets/js/field.js" defer></script>
  </head>
  <body class="bg-light">
    <div class="d-flex" style="min-height: 100vh">
      <div
        class="d-flex flex-column flex-shrink-0 p-3 bg-white border-end shadow-sm"
        style="width: 280px"
      >
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <i class="bi bi-trophy fs-3 me-2 text-primary"></i>
          <span class="fs-4 fw-bold"> Fútbol 5 </span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto">
          <li class="mt-3 mb-1 text-muted small fw-bold text-uppercase px-3">
            Sistema
          </li>
          <li>
            <a href="users.html" class="nav-link link-dark">
              <i class="bi bi-people me-2"></i>
              Usuarios
            </a>
          </li>
          <li>
            <a href="employees.html" class="nav-link link-dark">
              <i class="bi bi-person-badge me-2"></i>
              Empleados
            </a>
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Instalaciones
          </li>
          <li>
            <a href="headquarters.html" class="nav-link link-dark">
              <i class="bi bi-building me-2"></i>
              Sedes
            </a>
          </li>
          <li>
            <a href="fields.html" class="nav-link active">
              <i class="bi bi-grid me-2"></i>
              Canchas
            </a>
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Operaciones
          </li>
          <li>
            <a href="rentals.html" class="nav-link link-dark">
              <i class="bi bi-calendar-check me-2"></i>
              Reservas
            </a>
          </li>
        </ul>
        <hr />
        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle"
            id="dropdownUser"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <strong>Admin</strong>
          </a>
          <ul
            class="dropdown-menu text-small shadow"
            aria-labelledby="dropdownUser"
          >
            <li>
              <a class="dropdown-item text-danger" href="#" id="btn-logout">
                Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </div>
      <!-- Contenido -->
      <div class="p-4 w-100">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>Gestión de Canchas</h2>
        </div>
        <form id="fieldForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="facilitySelect" class="form-label"> Sede </label>
              <select id="facilitySelect" class="form-select" required>
                <option value="">Seleccione una sede</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="categorySelect" class="form-label"> Categoría </label>
              <select id="categorySelect" class="form-select" required>
                <option value="">Seleccione una categoría</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="statusSelect" class="form-label"> Estado </label>
              <select id="statusSelect" class="form-select" required>
                <option value="">Seleccione un estado</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="hourlyPrice" class="form-label">
                Precio por Hora
              </label>
              <input
                type="number"
                id="hourlyPrice"
                class="form-control"
                min="1"
                placeholder="Ingrese el precio"
                required
              />
            </div>
          </div>
          <div class="d-flex justify-content-end gap-2 mt-3">
            <button type="reset" class="btn btn-secondary">Limpiar</button>
            <button type="submit" class="btn btn-primary">
              Guardar Cancha
            </button>
          </div>
        </form>
        <div class="card shadow-sm mt-4">
          <div class="card-header bg-white">
            <strong>Listado de Canchas</strong>
          </div>
          <div class="card-body">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Sede</th>
                  <th>Categoría</th>
                  <th>Capacidad</th>
                  <th>Estado</th>
                  <th>Precio por Hora</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tableFields"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
