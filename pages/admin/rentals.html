<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Fútbol 5 - Reservas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <script src="../../assets/js/authGuard.js" defer></script>
    <script src="../../assets/js/rental.js" defer></script>
  </head>
  <body class="bg-light">
    <div class="d-flex" style="min-height: 100vh">
      <div
        class="d-flex flex-column flex-shrink-0 p-3 bg-white border-end shadow-sm"
        style="width: 280px"
      >
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <i class="bi bi-trophy fs-3 me-2 text-primary"></i>
          <span class="fs-4 fw-bold">Fútbol 5</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto">
          <li class="mt-3 mb-1 text-muted small fw-bold text-uppercase px-3">
            Sistema
          </li>
          <li>
            <a href="users.html" class="nav-link link-dark">
              <i class="bi bi-people me-2"></i> Usuarios
            </a>
          </li>
          <li>
            <a href="employees.html" class="nav-link link-dark">
              <i class="bi bi-person-badge me-2"></i> Empleados
            </a>
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Instalaciones
          </li>
          <li>
            <a href="#" class="nav-link link-dark">
              <i class="bi bi-building me-2"></i> Sedes
            </a>
          </li>
          <li>
            <a href="#" class="nav-link link-dark">
              <i class="bi bi-grid me-2"></i> Canchas
            </a>
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Operaciones
          </li>
          <li>
            <a
              href="rentals.html"
              class="nav-link active bg-primary text-white"
            >
              <i class="bi bi-calendar-check me-2"></i> Reservas
            </a>
          </li>
        </ul>
        <hr />
        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle"
            id="dropdownUser"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <strong>Admin</strong>
          </a>
          <ul
            class="dropdown-menu text-small shadow"
            aria-labelledby="dropdownUser"
          >
            <li>
              <a class="dropdown-item text-danger" href="#" id="btn-logout"
                >Cerrar sesión</a
              >
            </li>
          </ul>
        </div>
      </div>
      <div class="p-4 w-100">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="m-0">Gestión de Reservas</h2>
          <a
            href="rental-create.html"
            class="btn btn-primary d-flex align-items-center gap-2"
          >
            <i class="bi bi-plus-circle"></i> Nueva Reserva
          </a>
        </div>

        <div class="bg-white rounded-3 shadow-sm border overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Fecha</th>
                  <th>Horario</th>
                  <th>Cancha</th>
                  <th>Cliente</th>
                  <th>Precio</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="table-body-rentals">
                <tr>
                  <td colspan="7" class="text-center py-4 text-muted">
                    <div
                      class="spinner-border spinner-border-sm me-2"
                      role="status"
                    ></div>
                    Cargando reservas...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>
