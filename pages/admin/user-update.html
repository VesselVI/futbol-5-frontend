<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Fútbol 5 - Editar Usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <script src="../../assets/js/updateUser.js" defer></script>
  </head>
  <body class="bg-light">
    <div class="d-flex" style="min-height: 100vh">
      <div
        class="d-flex flex-column flex-shrink-0 p-3 bg-white border-end shadow-sm"
        style="width: 280px"
      >
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <i class="bi bi-trophy fs-3 me-2 text-primary"></i>
          <span class="fs-4 fw-bold">Fútbol 5</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto">
          <li class="mt-3 mb-1 text-muted small fw-bold text-uppercase px-3">
            Sistema
          </li>
          <li>
            <a href="users.html" class="nav-link active bg-primary text-white">
              <i class="bi bi-people me-2"></i>
              Usuarios
            </a>
          </li>
          <li>
            <a href="#" class="nav-link link-dark">
              <i class="bi bi-person-badge me-2"></i>
              Empleados
            </a>
          </li>
          <li>
            <a
              href="#collapseConfig"
              data-bs-toggle="collapse"
              class="nav-link link-dark d-flex align-items-center"
              aria-expanded="false"
            >
              <i class="bi bi-gear me-2"></i>
              Configuración
              <i
                class="bi bi-chevron-down ms-auto"
                style="font-size: 0.8rem"
              ></i>
            </a>
            <div class="collapse" id="collapseConfig">
              <ul class="nav flex-column ms-3">
                <li>
                  <a href="#" class="nav-link link-secondary small py-1">
                    <i class="bi bi-dot"></i> Estados de Cancha
                  </a>
                </li>
                <li>
                  <a href="#" class="nav-link link-secondary small py-1">
                    <i class="bi bi-dot"></i> Estados de Renta
                  </a>
                </li>
                <li>
                  <a href="#" class="nav-link link-secondary small py-1">
                    <i class="bi bi-dot"></i> Categorías
                  </a>
                </li>
              </ul>
            </div>
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Instalaciones
          </li>
          <li>
            <a href="#" class="nav-link link-dark">
              <i class="bi bi-building me-2"></i>
              Sedes
            </a>
          </li>
          <li>
            <a href="#" class="nav-link link-dark">
              <i class="bi bi-grid me-2"></i>
              Canchas
            </a>
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Operaciones
          </li>
          <li>
            <a href="#" class="nav-link link-dark">
              <i class="bi bi-calendar-check me-2"></i>
              Reservas
            </a>
          </li>
        </ul>
        <hr />
        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle"
            id="dropdownUser"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <strong>Admin</strong>
          </a>
          <ul
            class="dropdown-menu text-small shadow"
            aria-labelledby="dropdownUser"
          >
            <li>
              <a class="dropdown-item text-danger" href="#">Cerrar sesión</a>
            </li>
          </ul>
        </div>
      </div>

      <div class="p-4 w-100">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="m-0">
            Editar Usuario
            <span id="display-user-id" class="text-muted fs-4"></span>
          </h2>
          <a
            href="users.html"
            class="btn btn-outline-secondary d-flex align-items-center gap-2"
          >
            <i class="bi bi-arrow-left"></i> Volver a la lista
          </a>
        </div>

        <div
          class="card border-0 shadow-sm rounded-3 mx-auto"
          style="max-width: 800px"
        >
          <div class="card-body p-4 p-md-5">
            <form id="form-edit-user">
              <h5 class="mb-4 text-primary border-bottom pb-2">
                Datos de Cuenta
              </h5>
              <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                  <label for="inputEmail" class="form-label fw-medium"
                    >Correo Electrónico
                    <span class="text-danger">*</span></label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="inputEmail"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label for="selectRentalStatus" class="form-label fw-medium"
                    >Estado de Renta <span class="text-danger">*</span></label
                  >
                  <select class="form-select" id="selectRentalStatus" required>
                    <option value="1">Habilitado</option>
                    <option value="2">Deshabilitado</option>
                  </select>
                </div>
              </div>

              <h5 class="mb-4 text-primary border-bottom pb-2">
                Datos Personales
              </h5>
              <div class="row mb-3">
                <div class="col-12 mb-3">
                  <label for="inputName" class="form-label fw-medium"
                    >Nombre Completo <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="inputName"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3 mb-md-0">
                  <label for="inputDni" class="form-label fw-medium"
                    >DNI <span class="text-danger">*</span></label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="inputDni"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3 mb-md-0">
                  <label for="inputPhone" class="form-label fw-medium"
                    >Teléfono <span class="text-danger">*</span></label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="inputPhone"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label for="selectRole" class="form-label fw-medium"
                    >Rol del Sistema <span class="text-danger">*</span></label
                  >
                  <select class="form-select" id="selectRole" required>
                    <option value="2">Cliente (User)</option>
                    <option value="1">Administrador (Admin)</option>
                  </select>
                </div>
              </div>
              <div
                id="error-message"
                class="alert alert-danger d-none mt-3"
                role="alert"
              ></div>

              <div
                class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top"
              >
                <a href="users.html" class="btn btn-light">Cancelar</a>
                <button
                  type="submit"
                  class="btn btn-primary px-4"
                  id="btn-submit"
                >
                  Actualizar Cambios
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>
