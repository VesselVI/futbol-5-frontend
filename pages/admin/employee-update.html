<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Fútbol 5 - Editar Empleado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <script src="../../assets/js/authGuard.js" defer></script>
    <script src="../../assets/js/updateEmployee.js" defer></script>
  </head>
  <body class="bg-light">
    <div class="d-flex" style="min-height: 100vh">
      <div
        class="d-flex flex-column flex-shrink-0 p-3 bg-white border-end shadow-sm"
        style="width: 280px"
      >
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <i class="bi bi-trophy fs-3 me-2 text-primary"></i>
          <span class="fs-4 fw-bold">Fútbol 5</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto">
          <li class="mt-3 mb-1 text-muted small fw-bold text-uppercase px-3">
            Sistema
          </li>
          <li>
            <a href="users.html" class="nav-link link-dark"
              ><i class="bi bi-people me-2"></i> Usuarios</a
            >
          </li>
          <li>
            <a
              href="employees.html"
              class="nav-link active bg-primary text-white"
              ><i class="bi bi-person-badge me-2"></i> Empleados</a
            >
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Instalaciones
          </li>
          <li>
            <a href="headquarters.html" class="nav-link link-dark"
              ><i class="bi bi-building me-2"></i> Sedes</a
            >
          </li>
          <li>
            <a href="fiels.html" class="nav-link link-dark"
              ><i class="bi bi-grid me-2"></i> Canchas</a
            >
          </li>
          <li class="mt-4 mb-1 text-muted small fw-bold text-uppercase px-3">
            Operaciones
          </li>
          <li>
            <a href="rentals.html" class="nav-link link-dark"
              ><i class="bi bi-calendar-check me-2"></i> Reservas</a
            >
          </li>
        </ul>
        <hr />
        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle"
            id="dropdownUser"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <strong>Admin</strong>
          </a>
          <ul
            class="dropdown-menu text-small shadow"
            aria-labelledby="dropdownUser"
          >
            <li>
              <a class="dropdown-item text-danger" href="#" id="btn-logout"
                >Cerrar sesión</a
              >
            </li>
          </ul>
        </div>
      </div>

      <!-- ================= CONTENIDO ================= -->
      <div class="p-4 w-100">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="m-0">
            Editar Empleado
            <span id="display-emp-id" class="text-muted fs-4"></span>
          </h2>
          <a href="employees.html" class="btn btn-outline-secondary"
            ><i class="bi bi-arrow-left"></i> Volver</a
          >
        </div>

        <div
          class="card border-0 shadow-sm rounded-3 mx-auto"
          style="max-width: 800px"
        >
          <div class="card-body p-4 p-md-5">
            <form id="form-edit-employee">
              <h5 class="mb-4 text-primary border-bottom pb-2">
                Datos Personales
              </h5>
              <div class="row mb-4">
                <div class="col-12 mb-3">
                  <label for="inputName" class="form-label fw-medium"
                    >Nombre Completo <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="inputName"
                    required
                  />
                </div>
                <div class="col-md-6 mb-3 mb-md-0">
                  <label for="inputDni" class="form-label fw-medium"
                    >DNI <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="inputDni"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label for="inputPhone" class="form-label fw-medium"
                    >Teléfono <span class="text-danger">*</span></label
                  >
                  <input
                    type="tel"
                    class="form-control"
                    id="inputPhone"
                    required
                  />
                </div>
              </div>

              <h5 class="mb-4 text-primary border-bottom pb-2">
                Datos Laborales
              </h5>
              <div class="row mb-3">
                <div class="col-md-6 mb-3">
                  <label for="selectFacility" class="form-label fw-medium"
                    >Sede Asignada <span class="text-danger">*</span></label
                  >
                  <select
                    class="form-select"
                    id="selectFacility"
                    required
                  ></select>
                </div>
                <div class="col-md-6">
                  <label for="selectStatus" class="form-label fw-medium"
                    >Estado Laboral <span class="text-danger">*</span></label
                  >
                  <select class="form-select" id="selectStatus" required>
                    <option value="1">Activo</option>
                    <option value="2">Inactivo</option>
                    <option value="3">De Vacaciones</option>
                  </select>
                </div>
              </div>

              <div
                id="error-message"
                class="alert alert-danger d-none mt-3"
                role="alert"
              ></div>
              <div
                class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top"
              >
                <a href="employees.html" class="btn btn-light">Cancelar</a>
                <button
                  type="submit"
                  class="btn btn-primary px-4"
                  id="btn-submit"
                >
                  Actualizar Cambios
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>
