<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script src="/assets/js/main.js" defer></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/loginRegister.css">
    <title>Futbol 5 register</title>
</head>

<body>
    <section class="sectionBg vh-100">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col col-xl-10">
                    <div class="card" style="border-radius: 1rem;">
                        <div class="row g-0">

                            <div class="col-md-6 col-lg-7 d-flex align-items-center">
                                <div class="card-body p-5  text-black">

                                    <form>

                                        <div class="d-flex align-items-center mb-3 pb-1">

                                            <i class="fas fa-cubes fa-2x me-3"></i>
                                            <box-icon name='football'></box-icon>
                                            <span class="h1 fw-bold mb-0">Futbol 5</span>
                                        </div>

                                        <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">Crear una cuenta
                                            nueva</h5>
                                        <!-- name -->
                                        <div class="form-group col-md-6 mb-2 mt-1">
                                            <label for="inputName" class="mb-2">Nombre</label>
                                            <input type="text" class="form-control" id="inputName" required>
                                        </div>
                                        <!-- email -->
                                        <div class="form-group col-md-6 mb-2 mt-1">
                                            <label for="inputEmail" class="mb-2">Email</label>
                                            <input type="email" class="form-control" id="inputEmail" required>
                                        </div>
                                        <!-- phone Number -->
                                        <div class="form-group col-md-6 mb-2 mt-1">
                                            <label for="inputPhone" class="mb-2">Telefono</label>
                                            <input type="tel" class="form-control" id="inputPhone" required>
                                        </div>
                                        <!-- password -->
                                        <div class="form-group col-md-6 mb-2 mt-1">
                                            <label for="inputPassword" class="mb-2">Contraseña</label>
                                            <input type=" password" class="form-control" id="inputPassword" required>
                                        </div>


                                        <div class="pt-1 mb-4 mt-2">
                                            <button data-mdb-button-init data-mdb-ripple-init
                                                class="btn btn-dark btn-lg btn-block" type="submit"
                                                id="submitBtn">Registrarse</button>
                                        </div>



                                    </form>
                                    <p class="mb-3" ;">Ya tienes una cuenta? <a href="/pages/login.html" ;">Iniciá
                                            Sesión</a></p>

                                </div>
                            </div>
                            <div class="loginImg col-md-6 col-lg-5 d-none d-md-block">

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
